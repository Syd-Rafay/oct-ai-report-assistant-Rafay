services:
  - type: web
    name: oct-ai-backend
    runtime: python
    rootDir: oct-ai-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
  - type: web
    name: afio-corneal-ai-backend
    runtime: python
    rootDir: corneal-ai-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TORCH_NUM_THREADS
        value: "2"
      - key: CORNEAL_MODELS
        value: densenet121
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
  - type: web
    name: afio-retina-ai-backend
    runtime: node
    rootDir: retina-ai-backend
    buildCommand: >-
      python -m pip install gdown &&
      python -m gdown --folder https://drive.google.com/drive/folders/1VBxwdx-CoSBP906N3Zx_gEjRGfeQtglo --output ../models &&
      npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        value: https://cvclinics.online
      - key: SKIP_GRADCAM
        value: "true"

name: Keep Render Model Backends Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-model-backends:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping live model health endpoints
        run: |
          set -e
          urls=(
            "https://oct-ai-backend.onrender.com/health"
            "https://afio-corneal-ai-backend.onrender.com/health"
            "https://afio-corneal-resnet-backend.onrender.com/health"
            "https://afio-corneal-densenet-backend.onrender.com/health"
            "https://afio-corneal-efficientnet-backend.onrender.com/health"
            "https://afio-retina-ai-backend.onrender.com/health"
          )

          for url in "${urls[@]}"; do
            echo "Pinging $url"
            curl --fail --show-error --silent --max-time 90 \
              --retry 2 \
              --retry-delay 10 \
              "$url"
            echo
          done
